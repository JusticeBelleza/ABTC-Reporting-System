name: ABTC Automated Tests

# This tells GitHub to run this script every time you push code 
# to the main branch, or when someone makes a pull request.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Run Vitest Analytics & Math Suite
    runs-on: ubuntu-latest

    steps:
      # Step 1: Grab your code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up a fresh Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Using a modern, stable version of Node (LTS)
          cache: 'npm'     # Caches dependencies to make future runs much faster

      # Step 3: Install dependencies using a "Clean Install" (Industry Standard for CI/CD)
      # This strictly follows your package-lock.json so GitHub perfectly matches your laptop.
      - name: Install dependencies
        run: npm ci

      # Step 4: Run the bulletproof math, forecasting, and UI data tests!
      - name: Run unit tests
        # Vitest automatically detects the GitHub Actions CI environment 
        # and runs in "single-run" mode instead of "watch" mode.
        run: npm run test